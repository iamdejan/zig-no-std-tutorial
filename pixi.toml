[workspace]
authors = ["Giovanni Dejan <giovanni.dejan@binus.ac.id>"]
channels = ["conda-forge"]
name = "zig-no-std-tutorial"
platforms = ["linux-64", "osx-64", "osx-arm64"]
version = "0.1.0"

[tasks]
build = "zig build-exe src/main.zig -target thumb-freestanding-eabi -mcpu cortex_m3 -T linker.ld -fno-entry -O ReleaseSmall --name kernel.elf"
start = { cmd = "qemu-system-arm -M lm3s6965evb -kernel kernel.elf -nographic -semihosting", depends-on = ["build"]}
fmt = "zig fmt src/"
lint-ci = "zig fmt --check src/"
lint-fix = "zig fmt src/"

[dependencies]
zig = ">=0.15.2,<0.16"
pre-commit = ">=4.5.1,<5"
